<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#2563EB" />

		<!-- Primary Meta Tags -->
		<title>OpenPadang — Data Publik Padang & Sumbar</title>
		<meta name="title" content="OpenPadang — Data Publik Padang & Sumbar" />
		<meta
			name="description"
			content="Civic open data initiative untuk Padang & Sumbar. Terbuka, terstandar, gratis untuk siapa saja."
		/>

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://openpadang.info/" />
		<meta property="og:title" content="OpenPadang — Data Publik Padang & Sumbar" />
		<meta
			property="og:description"
			content="Civic open data initiative untuk Padang & Sumbar. Terbuka, terstandar, gratis untuk siapa saja."
		/>
		<meta property="og:image" content="https://openpadang.info/og-image.svg" />
		<meta property="og:locale" content="id_ID" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://openpadang.info/" />
		<meta property="twitter:title" content="OpenPadang — Data Publik Padang & Sumbar" />
		<meta
			property="twitter:description"
			content="Civic open data initiative untuk Padang & Sumbar. Terbuka, terstandar, gratis untuk siapa saja."
		/>
		<meta property="twitter:image" content="https://openpadang.info/og-image.svg" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
