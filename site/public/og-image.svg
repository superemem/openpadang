<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9FAFB"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.04">
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#2563EB" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Logo block -->
  <g transform="translate(90, 90)">
    <rect width="84" height="84" rx="16" fill="#2563EB"/>
    <circle cx="42" cy="34" r="14" fill="white"/>
    <circle cx="42" cy="34" r="6" fill="#2563EB"/>
    <path d="M42 48 L26 76 L58 76 Z" fill="white"/>
  </g>

  <!-- Title -->
  <text x="90" y="290" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="700" fill="#111827">
    OpenPadang
  </text>

  <!-- Tagline -->
  <text x="90" y="360" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="500" fill="#374151">
    Data publik Padang &amp; Sumbar
  </text>
  <text x="90" y="408" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="500" fill="#374151">
    Terbuka, terstandar, gratis.
  </text>

  <!-- Subtitle -->
  <text x="90" y="490" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#6B7280">
    Civic open data initiative · BMKG · OSM · BPS · PetaBencana
  </text>

  <!-- Footer URL -->
  <text x="90" y="565" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#2563EB">
    openpadang.info
  </text>

  <!-- Status badge -->
  <g transform="translate(990, 90)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#10B981" opacity="0.1"/>
    <circle cx="16" cy="16" r="4" fill="#10B981"/>
    <text x="28" y="22" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#10B981">
      Foundation
    </text>
  </g>
</svg>
